<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Internal Use</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #05070a;
            --card: #11141d;
            --accent: #00f2ea; /* Color neón profesional */
            --input-bg: #1a1f2b;
            --text: #e2e8f0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .admin-panel {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border: 1px solid #2d3748;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { 
            font-size: 1.4rem; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            color: var(--accent);
            margin: 0;
        }
        .header p { font-size: 0.8rem; color: #718096; margin-top: 5px; }

        .field { margin-bottom: 20px; }
        label { 
            display: block; 
            font-size: 0.75rem; 
            font-weight: 700; 
            margin-bottom: 8px; 
            color: #a0aec0;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 14px;
            background: var(--input-bg);
            border: 1px solid #2d3748;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 242, 234, 0.2);
        }

        .btn-execute {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .btn-execute:active { transform: scale(0.96); }

        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.7rem;
            color: #4a5568;
        }
    </style>
</head>
<body>

<div class="admin-panel">
    <div class="header">
        <h1>Internal System</h1>
        <p>Gestión de Pedidos de Crecimiento</p>
    </div>

    <div class="field">
        <label>Nombre de Usuario / Link</label>
        <input type="text" id="user" placeholder="@usuario o link completo...">
    </div>

    <div class="field">
        <label>Plataforma</label>
        <select id="platform">
            <option value="Instagram">Instagram</option>
            <option value="TikTok">TikTok</option>
            <option value="WhatsApp">WhatsApp (Canal)</option>
        </select>
    </div>

    <div class="field">
        <label>Tipo de Servicio</label>
        <select id="service">
            <option>Seguidores</option>
            <option>Likes / Me gusta</option>
            <option>Vistas (Views)</option>
            <option>Miembros de Canal</option>
            <option>Reacciones</option>
        </select>
    </div>

    <div class="field">
        <label>Cantidad a Enviar</label>
        <input type="number" id="qty" placeholder="Ej: 5000">
    </div>

    <button class="btn-execute" onclick="procesar()">
        <i data-lucide="send"></i> Ejecutar Pedido
    </button>

    <div class="footer">
        https://njagmzok-ui.github.io
    </div>
</div>

<script>
    lucide.createIcons();

    function procesar() {
        const usuario = document.getElementById('user').value;
        const plataforma = document.getElementById('platform').value;
        const cantidad = document.getElementById('qty').value;
        const servicio = document.getElementById('service').value;

        if(!usuario || !cantidad) {
            alert("⚠️ Por favor completa todos los datos.");
            return;
        }

        alert(`✅ PROCESANDO: \n\n${servicio} para ${plataforma}\nUsuario: ${usuario}\nCantidad: ${cantidad}`);
        
        // Aquí podrías agregar código para que te llegue un mensaje o se guarde
        console.log("Pedido ejecutado internamente");
    }
</script>

</body>
</html>
